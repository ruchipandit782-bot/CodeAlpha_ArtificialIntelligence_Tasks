<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FAQ Chatbot</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #090d16 0%, #1e1b4b 60%, #030712 100%);
            --panel-bg: rgba(30, 41, 59, 0.4);
            --panel-border: rgba(255, 255, 255, 0.08);
            --primary: #818cf8;
            --primary-dark: #6366f1;
            --chat-user-bg: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
            --chat-bot-bg: rgba(255, 255, 255, 0.06);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
            overflow: hidden;
        }

        .back-link {
            align-self: flex-start;
            margin-bottom: 25px;
            color: var(--text-muted);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 500;
            transition: color 0.2s;
            max-width: 800px;
            width: 100%;
        }

        .back-link:hover {
            color: var(--primary);
        }

        .chat-container {
            width: 100%;
            max-width: 800px;
            height: 75vh;
            background: var(--panel-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--panel-border);
            border-radius: 24px;
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            padding: 20px 30px;
            background: rgba(15, 23, 42, 0.6);
            border-bottom: 1px solid var(--panel-border);
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .bot-avatar {
            width: 48px;
            height: 48px;
            border-radius: 14px;
            background: linear-gradient(135deg, #818cf8 0%, #34d399 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.4rem;
            color: #ffffff;
            box-shadow: 0 0 15px rgba(129, 140, 248, 0.3);
        }

        .bot-info h2 {
            font-size: 1.15rem;
            font-weight: 600;
        }

        .bot-info p {
            font-size: 0.8rem;
            color: #34d399;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .bot-info p::before {
            content: '';
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #34d399;
            box-shadow: 0 0 8px #34d399;
        }

        .chat-messages {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
            background: rgba(15, 23, 42, 0.15);
        }

        .message {
            display: flex;
            max-width: 80%;
            animation: slideUp 0.3s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .message.bot {
            align-self: flex-start;
        }

        .msg-bubble {
            padding: 14px 20px;
            border-radius: 18px;
            line-height: 1.5;
            font-size: 0.95rem;
        }

        .message.user .msg-bubble {
            background: var(--chat-user-bg);
            color: white;
            border-bottom-right-radius: 4px;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.2);
        }

        .message.bot .msg-bubble {
            background: var(--chat-bot-bg);
            color: #e2e8f0;
            border: 1px solid var(--panel-border);
            border-bottom-left-radius: 4px;
        }

        .suggestions-container {
            padding: 12px 30px;
            background: rgba(15, 23, 42, 0.3);
            border-top: 1px solid rgba(255, 255, 255, 0.04);
        }

        .suggestions-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .suggestions-wrapper {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding-bottom: 5px;
        }

        .suggestion-chip {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--panel-border);
            border-radius: 20px;
            padding: 8px 16px;
            font-size: 0.82rem;
            color: #e2e8f0;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s;
        }

        .suggestion-chip:hover {
            background: var(--primary-light);
            border-color: var(--primary);
            color: white;
            transform: translateY(-1px);
        }

        .chat-input-form {
            padding: 20px 30px;
            background: rgba(15, 23, 42, 0.7);
            border-top: 1px solid var(--panel-border);
            display: flex;
            gap: 15px;
        }

        .chat-input {
            flex: 1;
            padding: 14px 20px;
            background: rgba(9, 13, 22, 0.6);
            border: 1px solid var(--panel-border);
            border-radius: 14px;
            color: var(--text-main);
            font-size: 0.95rem;
            font-family: inherit;
            outline: none;
            transition: all 0.3s;
        }

        .chat-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(129, 140, 248, 0.15);
        }

        .send-btn {
            background: linear-gradient(135deg, var(--primary-dark) 0%, #4338ca 100%);
            border: none;
            color: white;
            width: 48px;
            height: 48px;
            border-radius: 14px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.1rem;
            transition: all 0.2s;
        }

        .send-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.5);
        }
    </style>
</head>
<body>

    <a href="index.html" class="back-link"><i class="fa-solid fa-arrow-left"></i> Back to AI Hub</a>

    <div class="chat-container">
        <!-- Header -->
        <div class="chat-header">
            <div class="bot-avatar">
                <i class="fa-solid fa-robot"></i>
            </div>
            <div class="bot-info">
                <h2>AI & ML Assistant</h2>
                <p>Online</p>
            </div>
        </div>

        <!-- Message logs -->
        <div class="chat-messages" id="chat-messages">
            <div class="message bot">
                <div class="msg-bubble">
                    Hello! Ask me any FAQ questions about AI or Machine Learning, and I will search my database client-side using TF-IDF & Cosine Similarity!
                </div>
            </div>
        </div>

        <!-- FAQ Suggestions -->
        <div class="suggestions-container">
            <div class="suggestions-title">Quick Questions</div>
            <div class="suggestions-wrapper">
                <div class="suggestion-chip" onclick="askQuestion('What is AI?')">What is AI?</div>
                <div class="suggestion-chip" onclick="askQuestion('Difference between AI, ML, and DL?')">AI vs ML vs DL?</div>
                <div class="suggestion-chip" onclick="askQuestion('What is Overfitting?')">What is Overfitting?</div>
                <div class="suggestion-chip" onclick="askQuestion('What is Cosine Similarity?')">Cosine Similarity?</div>
            </div>
        </div>

        <!-- Input Box -->
        <div class="chat-input-form">
            <input type="text" class="chat-input" id="chat-input" placeholder="Type your AI question here..." autocomplete="off">
            <button class="send-btn" id="send-btn"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
    </div>

    <script>
        const FAQS = [
            { question: "What is Artificial Intelligence (AI)?", answer: "Artificial Intelligence is a branch of computer science concerned with building smart machines capable of performing tasks that typically require human intelligence, such as visual perception, speech recognition, decision-making, and translation between languages." },
            { question: "What is the difference between AI, Machine Learning, and Deep Learning?", answer: "Artificial Intelligence is the broad concept of machines acting smartly. Machine Learning (ML) is a subset of AI that allows machines to learn from data without explicit programming. Deep Learning (DL) is a subset of ML that uses multi-layered neural networks (like the human brain) to solve highly complex problems." },
            { question: "What is Supervised Learning?", answer: "Supervised Learning is a type of Machine Learning where the model is trained on labeled data. The algorithm learns a mapping function from input variables to output variables using known input-output pairs." },
            { question: "What is Unsupervised Learning?", answer: "Unsupervised Learning is a type of Machine Learning where the model is trained on unlabeled data. The algorithm tries to find hidden patterns, groupings, or structures within the data without any pre-existing labels." },
            { question: "What is Overfitting and how can it be prevented?", answer: "Overfitting occurs when a model learns the detail and noise in the training data to the extent that it negatively impacts the model's performance on new data. It can be prevented using techniques like cross-validation, regularization (L1/L2), pruning, dropout, or adding more training data." },
            { question: "What is Natural Language Processing (NLP)?", answer: "Natural Language Processing is a field of AI that enables computers to understand, interpret, and manipulate human language. It is used in applications like translation, sentiment analysis, speech recognition, and chatbots." },
            { question: "What is Cosine Similarity?", answer: "Cosine Similarity is a metric used to measure how similar two vectors are. It measures the cosine of the angle between two vectors projected in a multi-dimensional space, which determines whether they are pointing in roughly the same direction (ranging from -1 to 1)." }
        ];

        function tokenize(text) {
            return text.toLowerCase().replace(/[^\w\s]/g, '').split(/\s+/).filter(w => w.length > 0);
        }

        function matchQuery(query) {
            const queryTokens = tokenize(query);
            if (queryTokens.length === 0) return "Please enter a valid question.";

            const corpus = FAQS.map(faq => tokenize(faq.question));
            const vocab = Array.from(new Set(corpus.flat()));
            
            const N = corpus.length;
            const idf = {};
            vocab.forEach(word => {
                const df = corpus.filter(doc => doc.includes(word)).length;
                idf[word] = Math.log((1 + N) / (1 + df)) + 1;
            });

            function getVector(tokens) {
                const vec = new Array(vocab.length).fill(0);
                const tf = {};
                tokens.forEach(w => tf[w] = (tf[w] || 0) + 1);
                vocab.forEach((word, idx) => {
                    if (tf[word]) vec[idx] = (tf[word] / tokens.length) * idf[word];
                });
                return vec;
            }

            const faqVectors = corpus.map(doc => getVector(doc));
            const queryVector = getVector(queryTokens);
            const queryNorm = Math.sqrt(queryVector.reduce((sum, val) => sum + val*val, 0));
            if (queryNorm === 0) return "I couldn't understand that query. Could you try rephrasing?";

            let bestIndex = -1;
            let bestScore = -1;

            faqVectors.forEach((faqVec, idx) => {
                const faqNorm = Math.sqrt(faqVec.reduce((sum, val) => sum + val*val, 0));
                if (faqNorm === 0) return;

                let dot = 0;
                for (let i = 0; i < vocab.length; i++) dot += faqVec[i] * queryVector[i];
                const score = dot / (faqNorm * queryNorm);

                if (score > bestScore) {
                    bestScore = score;
                    bestIndex = idx;
                }
            });

            if (bestScore >= 0.15 && bestIndex !== -1) {
                return FAQS[bestIndex].answer;
            } else {
                return "I couldn't match that question in my FAQs database. Try asking differently!";
            }
        }

        const chatMessages = document.getElementById('chat-messages');
        const chatInput = document.getElementById('chat-input');
        const sendBtn = document.getElementById('send-btn');

        function appendMessage(text, isUser = false) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isUser ? 'user' : 'bot'}`;
            messageDiv.innerHTML = `<div class="msg-bubble">${text}</div>`;
            chatMessages.appendChild(messageDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function handleSend() {
            const val = chatInput.value.trim();
            if (!val) return;
            appendMessage(val, true);
            chatInput.value = '';

            setTimeout(() => {
                const answer = matchQuery(val);
                appendMessage(answer, false);
            }, 400);
        }

        sendBtn.addEventListener('click', handleSend);
        chatInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') handleSend();
        });

        function askQuestion(q) {
            chatInput.value = q;
            handleSend();
        }
    </script>
</body>
</html>
